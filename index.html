<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechElite Automation | Elevate Your Digital Presence</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: 'Fira Code', 'JetBrains Mono', 'Source Code Pro', 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      padding: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #0d1b2a, #1b263b);
      box-shadow: 0 0 30px rgba(0, 170, 255, 0.5);
    }
    .logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px; /* Adjust spacing between logo and text */
    }
    .logo-container img {
      max-width: 100%;
      height: auto;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    h2 {
      font-size: 1.6rem;
      font-weight: 400;
      color: #00aaff;
    }
    p {
      font-size: 1.1rem;
      margin-top: 20px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="/assets/images/logo.png" alt="Tech Elite Automation Logo">
    </div>
    <h1>TACMS</h1>
    <h2>The Autonomous Content Monetization System</h2>
    <p>Coming Soon</p>
  </div>
</body>
</html>
