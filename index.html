<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechElite Automation | Elevate Your Digital Presence</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: 'Fira Code', 'JetBrains Mono', 'Source Code Pro', 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      padding: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #0d1b2a, #1b263b);
      box-shadow: 0 0 30px rgba(0, 170, 255, 0.5);
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    h2 {
      font-size: 1.6rem;
      font-weight: 400;
      color: #00aaff;
    }
    h3 {
      font-size: 1.2rem;
      margin-top: 10px;
      font-weight: 400;
      color: #cccccc;
    }
    p {
      font-size: 1.1rem;
      margin-top: 20px;
      opacity: 0.8;
    }
    .cta {
      margin-top: 30px;
    }
    .cta a {
      display: inline-block;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #ffffff;
      background: #00aaff;
      border-radius: 6px;
      text-decoration: none;
      transition: 0.3s;
    }
    .cta a:hover {
      background: #0088cc;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/assets/images/logo.png" alt="Tech Elite Automation Logo - Expert in Business Automation, IT Consulting, and Optimization Solutions">
    <h1>TACMS</h1>
    <h2>The Autonomous Content Monetization System</h2>
    <p>Coming Soon</p>
  </div>
</body>
</html>
